# ===============================
# Redirect HTTP → HTTPS
# ===============================
server {
    listen 80;
    server_name teamproject.deep-technologies.com www.teamproject.deep-technologies.com;
    return 301 https://teamproject.deep-technologies.com$request_uri;
}

# ===============================
# HTTPS SERVER
# ===============================
server {
    listen 443 ssl http2;
    server_name teamproject.deep-technologies.com www.teamproject.deep-technologies.com;

    # === SSL CONFIGURATION ===
    ssl_certificate     /etc/ssl/certs/fullchain.pem;
    ssl_certificate_key /etc/ssl/private/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers HIGH:!aNULL:!MD5;

    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # === SECURITY HEADERS ===
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # === LOGS ===
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # ===============================
    # FRONTEND (Next.js / NextAuth)
    # ===============================
    location / {
        proxy_pass http://web-frontend:3001;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        proxy_cache_bypass $http_upgrade;
    }

    # ===============================
    # BACKEND API
    # ===============================
    location /api/ {
        proxy_pass http://api-backend:3000/api/;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # === CORS ===
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }
}
