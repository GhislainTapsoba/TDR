# ===============================
# Redirect HTTP → HTTPS
# ===============================
server {
    listen 80;
    server_name teamproject.deep-technologies.com www.teamproject.deep-technologies.com;
    return 301 https://teamproject.deep-technologies.com$request_uri;
}

# ===============================
# HTTPS SERVER
# ===============================
server {
    listen 443 ssl http2;
    server_name teamproject.deep-technologies.com www.teamproject.deep-technologies.com;

    # ===============================
    # SSL CONFIGURATION
    # ===============================
    ssl_certificate     /etc/letsencrypt/live/teamproject.deep-technologies.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/teamproject.deep-technologies.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers HIGH:!aNULL:!MD5;

    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # ===============================
    # SECURITY HEADERS
    # ===============================
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ===============================
    # LOGS
    # ===============================
    access_log /var/log/nginx/teamproject_access.log;
    error_log  /var/log/nginx/teamproject_error.log;

    # ===============================
    # FRONTEND (Next.js / NextAuth)
    # ===============================
    location / {
        proxy_pass http://web-frontend:3001;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # ===============================
    # BACKEND API
    # ===============================
    location /api/ {
        proxy_pass http://api-backend:3000/api/;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # ===============================
        # CORS SAFE POUR NEXTAUTH
        # ===============================
        add_header Access-Control-Allow-Origin "https://teamproject.deep-technologies.com" always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;

        if ($request_method = OPTIONS) {
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }
    }
}
